<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momn Portfolio Dashboard</title>
<!-- Chart.js loaded at bottom -->
<style>
/* ── Reset & Base ─────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;
  --border:#2e334d;--text:#e8eaf0;--muted:#7c84a0;--hint:#4a5068;
  --green:#34d399;--red:#f87171;--blue:#60a5fa;--amber:#fbbf24;
  --font:'DM Mono',ui-monospace,monospace;--sans:'DM Sans',system-ui,sans-serif;
}
html.light{
  --bg:#f4f6fa;--surface:#ffffff;--surface2:#f0f2f7;
  --border:#d0d5e8;--text:#1a1d2e;--muted:#5a6080;--hint:#9399b2;
  --green:#16a34a;--red:#dc2626;--blue:#2563eb;--amber:#d97706;
}
html{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
a{color:var(--blue);text-decoration:none}

/* ── Layout ────────────────────────────────────────────────────── */
.container{max-width:1100px;margin:0 auto;padding:20px 16px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.topbar h1{font-size:15px;font-weight:500;letter-spacing:.3px}
.topbar-right{display:flex;align-items:center;gap:12px}
#status{font-size:11px;color:var(--muted)}
#status.loading{color:var(--amber)}
#status.ok{color:var(--green)}
#status.err{color:var(--red)}
.btn{font-family:var(--sans);font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all .15s}
.btn:hover{background:var(--surface);color:var(--text);border-color:var(--blue)}

/* ── KPI strip ─────────────────────────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.kpi-label{font-size:10px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-size:22px;font-weight:600;font-family:var(--font);letter-spacing:-1px}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px;font-family:var(--font)}
.g{color:var(--green)}.r{color:var(--red)}.b{color:var(--blue)}

/* ── Cards ─────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.card-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.chart-row{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:16px}

/* ── Performance heatmap ───────────────────────────────────────── */
.perf-table{width:100%;border-collapse:collapse}
.perf-table th{font-size:10px;color:var(--muted);padding:4px 6px;text-align:center;font-weight:400}
.perf-table td{font-size:11px;text-align:center;padding:5px 4px;border-radius:4px;font-family:var(--font)}
.perf-table .yr-col{text-align:left;color:var(--muted);font-size:11px;padding-right:8px}

/* ── Holdings table ─────────────────────────────────────────────── */
.toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.search{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-size:12px;font-family:var(--sans)}
.search:focus{outline:none;border-color:var(--blue)}
.sort-group{display:flex;gap:4px}
.sort-btn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer}
.sort-btn.on{background:rgba(96,165,250,0.15);color:var(--blue);border-color:var(--blue)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:700px}
thead th{font-size:10px;color:var(--muted);font-weight:400;letter-spacing:.4px;text-transform:uppercase;padding:8px;text-align:right;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap}
thead th:first-child,thead th:nth-child(2){text-align:left}
thead th:hover{color:var(--blue);cursor:pointer}
tbody td{padding:7px 8px;border-bottom:1px solid rgba(46,51,77,.5);font-size:12px;font-family:var(--font);text-align:right;white-space:nowrap}
tbody td:first-child,tbody td:nth-child(2){text-align:left;font-family:var(--sans)}
tbody tr:hover td{background:rgba(255,255,255,.03)}
tbody tr:last-child td{border-bottom:none}
.cap{font-size:10px;padding:2px 7px;border-radius:10px;font-family:var(--sans)}
.Large{background:rgba(96,165,250,.15);color:#93c5fd}
.Mid{background:rgba(52,211,153,.15);color:#6ee7b7}
.Small{background:rgba(251,191,36,.15);color:#fcd34d}
.Micro{background:rgba(248,113,113,.15);color:#fca5a5}

/* ── Bottom cards ───────────────────────────────────────────────── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.rank-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(46,51,77,.4);font-size:12px}
.rank-item:last-child{border-bottom:none}
.rank-sym{font-weight:500;font-family:var(--font)}
.pct-chip{font-size:11px;padding:2px 9px;border-radius:10px;font-family:var(--font)}
.pct-g{background:rgba(52,211,153,.15);color:var(--green)}
.pct-r{background:rgba(248,113,113,.15);color:var(--red)}

/* ── Sector legend ──────────────────────────────────────────────── */
.sector-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.s-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.s-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── Loading overlay ────────────────────────────────────────────── */
#overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;transition:opacity .4s}
#overlay.hide{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:700px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .chart-row{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
}
</style>
</head>

<div id="overlay"><div class="spinner"></div></div>

  <!-- Charts Row -->

    <div class="card">

    </div>

      <div class="card-title">Sector allocation</div>
      <div class="sector-legend" id="sectorLeg"></div>

    </div>

  <!-- Performance Heatmap -->
  <div class="card" style="margin-bottom:16px">
    <div class="card-title">Monthly returns (%)</div>

        <thead><tr>

          <th style="color:#fbbf24">YTD</th>
        </tr></thead>
        <tbody id="perfBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Holdings Table -->
  <div class="card">
    <div class="toolbar">
      <input class="search" type="text" id="q" placeholder="Search symbol..." oninput="renderTable()">
      <div class="sort-group">
        <button class="sort-btn on" id="sb-gain" onclick="sortBy('gainPct')">Gain%</button>
        <button class="sort-btn" id="sb-currentVal" onclick="sortBy('currentVal')">Value</button>
        <button class="sort-btn" id="sb-posSize" onclick="sortBy('posSize')">Position</button>
        <button class="sort-btn" id="sb-todayPct" onclick="sortBy('todayPct')">Today</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead id="holdThead"><tr>
          <th style="text-align:left" onclick="sortBy('symbol')">Symbol</th>
          <th style="text-align:left">Cap</th>
          <th onclick="sortBy('cost')">Cost</th>
          <th onclick="sortBy('qty')">Qty</th>
          <th onclick="sortBy('cmp')">CMP</th>
          <th onclick="sortBy('currentVal')">Value</th>
          <th onclick="sortBy('gainPct')">Gain%</th>
          <th onclick="sortBy('todayPct')">Today%</th>
          <th onclick="sortBy('posSize')">Pos%</th>
        </tr></thead>
        <tbody id="holdBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Bottom: top gainers/losers + recent exits -->
  <div class="two-col">
    <div class="card">
      <div class="card-title">Top 5 gainers</div>
      <div id="topGain"></div>
    </div>
    <div class="card">
      <div class="card-title">Top 5 losers</div>
      <div id="topLoss"></div>
    </div>
  </div>
</div>

// ================================================================
// STATE
// ================================================================
var holdings = [];
var sortKey  = 'gainPct';
var sortDir  = -1; // -1=desc, 1=asc
var navChartInst = null, sectorChartInst = null;

// ================================================================
// DATA LOAD
// ================================================================
async function loadAll() {
  setStatus('loading', 'Loading...');
  try {
    var data;
    if (MOCK_MODE || API_URL.includes('YOUR_DEPLOYMENT_ID')) {
      // Mock mode OR API not configured yet
      data = MOCK;
      if (API_URL.includes('YOUR_DEPLOYMENT_ID')) {
        console.warn('Dashboard: API_URL not set — showing mock data. Set MOCK_MODE=false and update API_URL to connect live data.');
      }
    } else {
      try {
        var resp = await fetch(API_URL + '?action=all', { redirect: 'follow' });
        var json = await resp.json();
        if (!json.ok) throw new Error(json.error || 'API returned error');
        data = json.data;
      } catch(apiErr) {
        console.error('API fetch failed, falling back to mock:', apiErr.message);
        data = MOCK; // graceful fallback — show mock data on API failure
        setStatus('err', 'API error — showing cached data (' + apiErr.message + ')');
      }
    }
    renderAll(data);
  } catch(e) {
    setStatus('err', 'Error: ' + e.message);
    document.getElementById('overlay').classList.add('hide');
  }
}

function renderAll(data) {
  renderKPIs(data.portfolio.summary);
  renderNAV(data.nav);
  renderSector(data.portfolio.holdings);
  renderPerf(data.performance);
  holdings = data.portfolio.holdings;
  renderTable();
  renderTopGL();
  if(document.getElementById('status').className !== 'err') {
    setStatus('ok', 'Updated ' + new Date().toLocaleTimeString('en-IN'));
  }
  document.getElementById('overlay').classList.add('hide');
}

function setStatus(cls, msg) {
  var el = document.getElementById('status');
  el.className = cls;
  el.textContent = msg;
}

// ================================================================
// RENDER: KPIs
// ================================================================
function n(v, fallback) {
  // safe number: handles undefined, null, NaN, empty string
  var x = parseFloat(v);
  return isFinite(x) ? x : (fallback !== undefined ? fallback : 0);
}

function renderKPIs(s) {
  if (!s) return;

  // Current Value — support both field name styles
  var curVal = n(s.totalCurrentValue);
  set('kpiVal', '₹' + fmtL(curVal));

  // Net Cashflow — "netCashflow" (new) OR "totalInvestment" (old) OR "net_cashflow"
  var cashflow = n(s.netCashflow || s.totalInvestment || s.net_cashflow);
  set('kpiInv', 'Net Cashflow: ₹' + fmtL(cashflow));

  // Absolute Gains — "absoluteGains" (new) OR "totalGain" (old)
  var ag  = n(s.absoluteGains !== undefined ? s.absoluteGains : s.totalGain);
  var agp = n(s.absoluteGainsPct !== undefined ? s.absoluteGainsPct : s.gainPct);
  var gainEl  = document.getElementById('kpiGain');
  var gainPEl = document.getElementById('kpiGainPct');
  gainEl.textContent  = (ag >= 0 ? '+' : '') + '₹' + fmtL(ag);
  gainEl.className    = 'kpi-val ' + (ag >= 0 ? 'g' : 'r');
  gainPEl.textContent = fmtPct(agp);
  gainPEl.className   = 'kpi-sub ' + (agp >= 0 ? 'g' : 'r');

  // XIRR
  var xirr    = (s.xirr !== undefined && s.xirr !== null && !isNaN(+s.xirr)) ? +s.xirr : null;
  var xirrEl  = document.getElementById('kpiXirr');
  xirrEl.textContent = fmtPct(xirr);
  xirrEl.className   = 'kpi-val ' + (xirr !== null && xirr >= 0 ? 'g' : 'r');

  // NAV
  var nav = n(s.nav);
  var dd  = n(s.dd);
  set('kpiNav', nav > 0 ? nav.toFixed(2) : '—');
  set('kpiDD',  'Max: ' + n(s.maxNav).toFixed(2) + ' (DD: ' + dd.toFixed(1) + '%)');
  document.getElementById('kpiDD').className = 'kpi-sub ' + (dd < 0 ? 'r' : 'g');

  // Today's Gain
  var tg     = n(s.todayGain);
  var todayEl = document.getElementById('kpiToday');
  todayEl.textContent = (tg >= 0 ? '+' : '') + '₹' + fmtL(tg);
  todayEl.className   = 'kpi-val ' + (tg >= 0 ? 'g' : 'r');
  set('kpiStocks', (s.stockCount || 0) + ' stocks');
}

// ================================================================
// RENDER: NAV Chart
// ================================================================
function renderNAV(navData) {
  var vals   = navData.map(function(p){ return p.nav; });
  var labels = navData.map(function(p){ return p.date || ''; });
  if (navChartInst) navChartInst.destroy();
  navChartInst = new Chart(document.getElementById('navChart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        data: vals,
        borderColor: '#60a5fa',
        borderWidth: 1.5,
        fill: true,
        backgroundColor: 'rgba(96,165,250,0.08)',
        pointRadius: 0,
        tension: 0.3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: {
        label: function(ctx){ return 'NAV: ' + ctx.parsed.y.toFixed(2); }
      }}},
      scales: {
        x: { display: false },
        y: {
          grid: { color: document.documentElement.classList.contains('light') ? 'rgba(0,0,0,0.07)' : 'rgba(255,255,255,0.05)' },
          ticks: { color: document.documentElement.classList.contains('light') ? '#5a6080' : '#7c84a0', font: { size: 10 }, callback: function(v){ return v.toFixed(0); } }
        }
      }
    }
  });
}

// ================================================================
// RENDER: Sector donut
// ================================================================
function renderSector(h) {
  var sectorMap = {};
  h.forEach(function(hh){ sectorMap[hh.sector] = (sectorMap[hh.sector] || 0) + hh.currentVal; });
  var sectors = Object.entries(sectorMap).sort(function(a,b){ return b[1] - a[1]; });
  var totalV  = h.reduce(function(s,hh){ return s + hh.currentVal; }, 0);
  var colors  = ['#60a5fa','#34d399','#f87171','#fbbf24','#a78bfa','#fb923c','#38bdf8','#4ade80'];
  var legend  = document.getElementById('sectorLeg');
  legend.innerHTML = sectors.map(function(s,i){
    return '<span class="s-item"><span class="s-dot" style="background:' + colors[i % colors.length] + '"></span>'
      + s[0].replace('Consumer','C.') + ' ' + Math.round(s[1]/totalV*100) + '%</span>';
  }).join('');
  if (sectorChartInst) sectorChartInst.destroy();
  sectorChartInst = new Chart(document.getElementById('sectorChart'), {
    type: 'doughnut',
    data: {
      labels: sectors.map(function(s){ return s[0]; }),
      datasets: [{ data: sectors.map(function(s){ return s[1]; }), backgroundColor: colors, borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '68%',
      plugins: { legend: { display: false }, tooltip: { callbacks: {
        label: function(ctx){ return ctx.label + ': ' + Math.round(ctx.parsed/totalV*100) + '%'; }
      }}}
    }
  });
}

// ================================================================
// RENDER: Performance heatmap
// ================================================================
function renderPerf(data) {
  document.getElementById('perfBody').innerHTML = data.map(function(row){
    return '<tr><td class="yr-col">' + row.year + '</td>' +
      row.months.map(function(v){
        if (v === null) return '<td style="color:#4a5068">—</td>';
        var bg = v > 4 ? 'rgba(52,211,153,.25)' : v > 0 ? 'rgba(52,211,153,.1)' : v > -4 ? 'rgba(248,113,113,.1)' : 'rgba(248,113,113,.25)';
        var fg = v >= 0 ? '#34d399' : '#f87171';
        return '<td style="background:' + bg + ';color:' + fg + '">' + v.toFixed(1) + '%</td>';
      }).join('') +
      '<td style="font-weight:600;color:' + (row.yearTotal >= 0 ? '#34d399' : '#f87171') + '">' +
        (row.yearTotal !== null ? (row.yearTotal > 0 ? '+' : '') + row.yearTotal.toFixed(1) + '%' : '—') +
      '</td></tr>';
  }).join('');
}

// ================================================================
// RENDER: Holdings table
// ================================================================
function renderTable() {
  var q = document.getElementById('q').value.toLowerCase();
  var rows = holdings.filter(function(h){ return h.symbol.toLowerCase().includes(q); });
  rows.sort(function(a, b){
    var av = a[sortKey], bv = b[sortKey];
    if(typeof av === 'string') return sortDir * av.localeCompare(bv);
    return (bv - av) * sortDir;
  });
  document.getElementById('holdBody').innerHTML = rows.map(function(h){
    return '<tr>' +
      '<td style="font-weight:500">' + h.symbol + '</td>' +
      '<td><span class="cap ' + h.cap + '">' + h.cap + '</span></td>' +
      '<td>₹' + h.cost.toLocaleString('en-IN') + '</td>' +
      '<td>' + h.qty.toLocaleString('en-IN') + '</td>' +
      '<td>₹' + h.cmp.toLocaleString('en-IN') + '</td>' +
      '<td>₹' + fmtL(h.currentVal) + '</td>' +
      '<td style="color:' + (h.gainPct >= 0 ? '#34d399' : '#f87171') + '">' + fmtPct(h.gainPct) + '</td>' +
      '<td style="color:' + (h.todayPct >= 0 ? '#34d399' : '#f87171') + '">' + fmtPct(h.todayPct) + '</td>' +
      '<td>' + h.posSize.toFixed(2) + '%</td>' +
    '</tr>';
  }).join('');
}

var COL_KEYS = ['symbol','','cost','qty','cmp','currentVal','gainPct','todayPct','posSize'];
function sortBy(k) {
  if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = -1; }
  // update sort buttons
  document.querySelectorAll('.sort-btn').forEach(function(b){ b.classList.remove('on'); });
  var sbEl = document.getElementById('sb-' + k);
  if(sbEl) sbEl.classList.add('on');
  // update header arrows
  var ths = document.querySelectorAll('#holdThead th');
  ths.forEach(function(th,i){
    th.textContent = th.textContent.replace(' ↑','').replace(' ↓','');
    if(COL_KEYS[i] === k) th.textContent += sortDir === -1 ? ' ↓' : ' ↑';
  });
  renderTable();
}

// ================================================================
// RENDER: Top gainers / losers
// ================================================================
function renderTopGL() {
  var sorted = [...holdings].sort(function(a,b){ return b.gainPct - a.gainPct; });
  document.getElementById('topGain').innerHTML = sorted.slice(0, 5).map(function(h){
    return '<div class="rank-item"><span class="rank-sym">' + h.symbol + '</span>' +
      '<span class="pct-chip pct-g">' + fmtPct(h.gainPct) + '</span></div>';
  }).join('');
  document.getElementById('topLoss').innerHTML = sorted.slice(-5).reverse().map(function(h){
    return '<div class="rank-item"><span class="rank-sym">' + h.symbol + '</span>' +
      '<span class="pct-chip pct-r">' + fmtPct(h.gainPct) + '</span></div>';
  }).join('');
}

// ================================================================
// HELPERS
// ================================================================
function set(id, v){ document.getElementById(id).textContent = v; }

function toggleTheme(){
  var isLight = document.documentElement.classList.toggle('light');
  document.getElementById('themeBtn').textContent = isLight ? '☾ Dark' : '☀ Light';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  if(navChartInst) { navChartInst.destroy(); navChartInst=null; }
  if(sectorChartInst){ sectorChartInst.destroy(); sectorChartInst=null; }
  loadAll();
}
function fmtL(n){
  if(n==null||isNaN(n)) return '—';
  var a = Math.abs(n);
  var sign = n < 0 ? '-' : '';
  if (a >= 10000000) return sign + (a/10000000).toFixed(2) + 'Cr';
  if (a >= 100000)   return sign + (a/100000).toFixed(2) + 'L';
  if (a >= 1000)     return sign + (a/1000).toFixed(1) + 'K';
  return sign + a;
}
function fmtPct(v){ if(v==null||isNaN(v)) return '—'; return (v>=0?'+':'')+(+v).toFixed(2)+'%'; }

// ── Load Chart.js dynamically, then start ───────────────
function startDashboard() {
  if(localStorage.getItem('theme')==='light'){
    document.documentElement.classList.add('light');
    var tb=document.getElementById('themeBtn');
    if(tb) tb.textContent='☾ Dark';
  }
  loadAll();
  setInterval(loadAll, 5 * 60 * 1000);
}
var cjsScript = document.createElement('script');
cjsScript.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
cjsScript.onload  = startDashboard;
cjsScript.onerror = function(){
  setStatus('err', 'Chart.js load failed — check internet');
  document.getElementById('overlay').classList.add('hide');
};
document.head.appendChild(cjsScript);

// ── Auto-refresh every 5 minutes ──────────────────────────────
startDashboard();

</script>
