<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momn Portfolio Dashboard</title>
<!-- Chart.js loaded at bottom -->
<style>
/* ── Reset & Base ─────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --bg:#000000;--l1:#050505;--l2:#0A0C10;--l3:#11151C;--l4:#151A23;
  --sep:#1E2532;--sep2:#11151C;
  --t1:#F5EFEB;--t2:rgba(240,237,229,0.8);--t3:rgba(240,237,229,0.5);--t4:rgba(240,237,229,0.28);
  --green:#00D09E;--red:#FB3640;--blue:#0AD1A6;--amber:#FF9F0A;
  --card-shadow:0 10px 30px rgba(0,0,0,0.6);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;
}
html.light{
  --bg:#F0EDE5;--l1:#FFFFFF;--l2:#F9F8F6;--l3:#EAE6DE;--l4:#DCD8CC;
  --sep:rgba(0,70,67,0.15);--sep2:rgba(0,70,67,0.05);
  --t1:#000F08;--t2:rgba(0,15,8,0.8);--t3:rgba(0,15,8,0.55);--t4:rgba(0,15,8,0.3);
  --green:#00A880;--red:#FB3640;--blue:#004643;--amber:#d97706;
  --card-shadow:0 10px 30px rgba(0,0,0,0.07);
}
html{background:var(--bg);color:var(--t1);font-family:var(--font);font-size:14px;transition:background .3s}
a{color:var(--blue);text-decoration:none}

/* ── Layout ────────────────────────────────────────────────────── */
.container{max-width:1140px;margin:0 auto;padding:28px 20px 60px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--sep)}
.topbar h1{font-size:26px;font-weight:800;letter-spacing:-0.5px;color:var(--t1)}
.topbar-right{display:flex;align-items:center;gap:10px}
#status{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t3)}
#status.loading{color:var(--amber)}
#status.ok{color:var(--green)}
#status.err{color:var(--red)}
.btn{font-family:var(--font);font-size:12px;font-weight:600;padding:0 14px;height:32px;border-radius:20px;border:1px solid var(--sep);background:var(--l2);color:var(--t2);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--l3);color:var(--t1);border-color:var(--sep)}

/* ── KPI strip ─────────────────────────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--l2);border:1px solid var(--sep2);border-radius:20px;padding:20px 22px;box-shadow:var(--card-shadow);transition:border-color .3s,transform .2s}
.kpi:hover{border-color:var(--sep);transform:translateY(-2px)}
.kpi-label{font-size:11px;font-weight:700;color:var(--t4);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.kpi-val{font-size:26px;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1.1}
.kpi-sub{font-size:11px;font-weight:600;color:var(--t3);margin-top:6px;font-variant-numeric:tabular-nums}
.g{color:var(--green)}.r{color:var(--red)}.b{color:var(--blue)}

/* ── Cards ─────────────────────────────────────────────────────── */
.card{background:var(--l2);border:1px solid var(--sep2);border-radius:20px;padding:22px;box-shadow:var(--card-shadow);transition:border-color .3s}
.card-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.chart-row{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:16px}

/* ── Performance heatmap ───────────────────────────────────────── */
.perf-table{width:100%;border-collapse:collapse}
.perf-table th{font-size:10px;font-weight:700;color:var(--t4);padding:6px 8px;text-align:center;text-transform:uppercase;letter-spacing:.4px}
.perf-table td{font-size:11px;font-weight:600;text-align:center;padding:6px 5px;border-radius:5px;font-variant-numeric:tabular-nums}
.perf-table .yr-col{text-align:left;color:var(--t3);font-size:11px;padding-right:10px;font-weight:700}

/* ── Holdings table ─────────────────────────────────────────────── */
.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.search{flex:1;background:var(--l1);border:1px solid var(--sep2);border-radius:10px;padding:9px 14px;color:var(--t1);font-size:12px;font-family:var(--font);transition:.2s}
.search::placeholder{color:var(--t4)}
.search:focus{outline:none;border-color:var(--blue)}
.sort-group{display:flex;gap:4px}
.sort-btn{font-size:11px;font-weight:600;padding:0 14px;height:30px;border-radius:20px;border:1px solid var(--sep2);background:var(--l1);color:var(--t3);cursor:pointer;transition:.2s;font-family:var(--font)}
.sort-btn.on{background:rgba(10,209,166,0.12);color:var(--blue);border-color:rgba(10,209,166,0.3)}
.tbl-wrap{overflow-x:auto;border:1px solid var(--sep2);border-radius:14px;background:var(--l1)}
table{width:100%;border-collapse:collapse;min-width:700px}
thead th{background:var(--l2);font-size:10px;color:var(--t3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:14px 16px;text-align:right;border-bottom:1px solid var(--sep2);cursor:pointer;white-space:nowrap}
thead th:first-child,thead th:nth-child(2){text-align:left}
thead th:hover{color:var(--blue)}
tbody td{padding:12px 16px;border-bottom:1px solid var(--sep2);font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap;transition:.15s}
tbody td:first-child,tbody td:nth-child(2){text-align:left}
tbody tr:hover td{background:var(--l2)}
tbody tr:last-child td{border-bottom:none}
.cap{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.Large{background:rgba(10,209,166,.12);color:#0AD1A6}
.Mid{background:rgba(0,208,158,.12);color:#00D09E}
.Small{background:rgba(255,159,10,.12);color:#FF9F0A}
.Micro{background:rgba(251,54,64,.12);color:#FB3640}

/* ── Bottom cards ───────────────────────────────────────────────── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.rank-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--sep2);font-size:13px;font-weight:600}
.rank-item:last-child{border-bottom:none}
.rank-sym{font-weight:700;color:var(--t1)}
.pct-chip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.pct-g{background:rgba(0,208,158,.12);color:var(--green);border:1px solid rgba(0,208,158,.2)}
.pct-r{background:rgba(251,54,64,.12);color:var(--red);border:1px solid rgba(251,54,64,.2)}

/* ── Sector legend ──────────────────────────────────────────────── */
.sector-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.s-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--t3)}
.s-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}

/* ── Loading overlay ────────────────────────────────────────────── */
#overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;transition:opacity .4s}
#overlay.hide{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:2px solid var(--sep);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:900px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .chart-row{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
  .kpi-val{font-size:22px}
}
@media(max-width:500px){
  .kpi-row{grid-template-columns:1fr}
  .topbar h1{font-size:20px}
}
</style>
</head>

// DATA LOAD
// ================================================================
async function loadAll() {
  setStatus('loading', 'Loading...');
  try {
    var data;
    if (MOCK_MODE || API_URL.includes('YOUR_DEPLOYMENT_ID')) {
      // Mock mode OR API not configured yet
      data = MOCK;
      if (API_URL.includes('YOUR_DEPLOYMENT_ID')) {
        console.warn('Dashboard: API_URL not set — showing mock data. Set MOCK_MODE=false and update API_URL to connect live data.');
      }
    } else {
      try {
        var resp = await fetch(API_URL + '?action=all', { redirect: 'follow' });
        var json = await resp.json();
        if (!json.ok) throw new Error(json.error || 'API returned error');
        data = json.data;
      } catch(apiErr) {
        console.error('API fetch failed, falling back to mock:', apiErr.message);
        data = MOCK; // graceful fallback — show mock data on API failure
        setStatus('err', 'API error — showing cached data (' + apiErr.message + ')');
      }
    }
    renderAll(data);
  } catch(e) {
    setStatus('err', 'Error: ' + e.message);
    document.getElementById('overlay').classList.add('hide');
  }
}

function renderAll(data) {
  // KPIs, table, perf — no Chart.js dependency, always run first
  renderKPIs(data.portfolio.summary);
  renderPerf(data.performance);
  holdings = data.portfolio.holdings;
  renderTable();
  renderTopGL();

  // Charts — need Chart.js; isolate so failures don't wipe KPIs
  if (typeof Chart !== 'undefined') {
    try { renderNAV(data.nav); }    catch(e){ console.warn('NAV chart:', e.message); }
    try { renderSector(data.portfolio.holdings); } catch(e){ console.warn('Sector chart:', e.message); }
  } else {
    console.warn('Chart.js not loaded yet — charts skipped');
  }

  setStatus('ok', 'Updated ' + new Date().toLocaleTimeString('en-IN'));
  document.getElementById('overlay').classList.add('hide');
}

function setStatus(cls, msg) {
  var el = document.getElementById('status');
  el.className = cls;
  el.textContent = msg;
}

// ================================================================
// RENDER: KPIs
// ================================================================
function n(v, fallback) {
  // safe number: handles undefined, null, NaN, empty string
  var x = parseFloat(v);
  return isFinite(x) ? x : (fallback !== undefined ? fallback : 0);
}

function renderKPIs(s) {
  if (!s) return;

  // Current Value
  var curVal = n(s.totalCurrentValue || s.currentValue || s.current_value);
  set('kpiVal', '₹' + fmtL(curVal));

  // Net Cashflow — R9 in sheet. Field: "netCashflow" | "net_cashflow" | "R9" | "totalInvestment"
  var cashflow = n(s.netCashflow || s.net_cashflow || s.R9 || s.totalInvestment);
  set('kpiInv', 'Net Cashflow: ₹' + fmtL(cashflow));

  // Absolute Gains — R12 in sheet. Field: "absoluteGains" | "R12" | "totalGain"
  var ag  = n(s.absoluteGains !== undefined ? s.absoluteGains : (s.R12 !== undefined ? s.R12 : s.totalGain));
  // Absolute Gains % — can come as "absoluteGainsPct" | "R12Pct" | "gainPct" | "absolute_gains_pct"
  var agp = n(s.absoluteGainsPct !== undefined ? s.absoluteGainsPct : (s.absolute_gains_pct !== undefined ? s.absolute_gains_pct : s.gainPct));
  var gainEl  = document.getElementById('kpiGain');
  var gainPEl = document.getElementById('kpiGainPct');
  gainEl.textContent  = (ag >= 0 ? '+' : '') + '₹' + fmtL(ag);
  gainEl.className    = 'kpi-val ' + (ag >= 0 ? 'g' : 'r');
  gainPEl.textContent = fmtPct(agp);
  gainPEl.className   = 'kpi-sub ' + (agp >= 0 ? 'g' : 'r');

  // XIRR — U3 in sheet. Field: "xirr" | "U3" | "xirrValue"
  var xirrRaw = s.xirr !== undefined ? s.xirr : (s.U3 !== undefined ? s.U3 : (s.xirrValue !== undefined ? s.xirrValue : null));
  var xirr    = (xirrRaw !== null && xirrRaw !== '' && !isNaN(+xirrRaw)) ? +xirrRaw : null;
  var xirrEl  = document.getElementById('kpiXirr');
  xirrEl.textContent = xirr !== null ? fmtPct(xirr) : '—';
  xirrEl.className   = 'kpi-val ' + (xirr !== null && xirr >= 0 ? 'g' : 'r');

  // NAV — U9 in sheet. Field: "nav" | "U9" | "navValue"
  var navRaw = s.nav !== undefined ? s.nav : (s.U9 !== undefined ? s.U9 : s.navValue);
  var nav = n(navRaw);
  // maxNav & DD
  var maxNav = n(s.maxNav || s.max_nav || s.maxNavValue);
  var dd     = n(s.dd || s.drawdown);
  set('kpiNav', nav > 0 ? nav.toFixed(2) : '—');
  set('kpiDD',  'Max: ' + (maxNav > 0 ? maxNav.toFixed(2) : '—') + ' (DD: ' + dd.toFixed(1) + '%)');
  document.getElementById('kpiDD').className = 'kpi-sub ' + (dd < 0 ? 'r' : 'g');

  // Today's Gain — R13 in sheet. Field: "todayGain" | "R13" | "today_gain" | "todaysGain"
  var tg = n(s.todayGain !== undefined ? s.todayGain : (s.R13 !== undefined ? s.R13 : (s.today_gain !== undefined ? s.today_gain : s.todaysGain)));
  var todayEl = document.getElementById('kpiToday');
  todayEl.textContent = (tg >= 0 ? '+' : '') + '₹' + fmtL(tg);
  todayEl.className   = 'kpi-val ' + (tg >= 0 ? 'g' : 'r');
  set('kpiStocks', (s.stockCount || s.stock_count || 0) + ' stocks');
}

// ================================================================
// RENDER: NAV Chart
// ================================================================
function renderNAV(navData) {
  if (!navData || navData.length === 0) return;
  var vals   = navData.map(function(p){ return p.nav; });
  var labels = navData.map(function(p){ return p.date || ''; });
  var minVal = Math.min.apply(null, vals);
  var maxVal = Math.max.apply(null, vals);
  var pad    = (maxVal - minVal) * 0.05;

  if (navChartInst) navChartInst.destroy();
  navChartInst = new Chart(document.getElementById('navChart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        // Baseline 100 reference line
        {
          data: vals.map(function(){ return 100; }),
          borderColor: 'rgba(240,237,229,0.12)',
          borderWidth: 1,
          borderDash: [4,4],
          fill: false,
          pointRadius: 0,
          tension: 0
        },
        // NAV line
        {
          data: vals,
          borderColor: '#0AD1A6',
          borderWidth: 1.8,
          fill: true,
          backgroundColor: 'rgba(10,209,166,0.05)',
          pointRadius: 0,
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index', intersect: false,
          callbacks: {
            title: function(ctx){ return ctx[0].label || ''; },
            label: function(ctx){
              if (ctx.datasetIndex === 0) return null; // hide baseline tooltip
              var p = navData[ctx.dataIndex];
              return [
                'NAV: ' + ctx.parsed.y.toFixed(2),
                'Max: ' + (p.maxNav||0).toFixed(2),
                'DD: '  + (p.dd||0).toFixed(2) + '%'
              ];
            }
          }
        }
      },
      scales: {
        x: {
          display: false,
          ticks: { maxTicksLimit: 8 }
        },
        y: {
          min: Math.max(Math.floor(minVal - pad), 85),
          grid: { color: 'rgba(240,237,229,0.04)' },
          ticks: {
            color: 'rgba(240,237,229,0.4)',
            font: { size: 10 },
            callback: function(v){ return v.toFixed(0); }
          }
        }
      }
    }
  });
}

// ================================================================
// RENDER: Sector donut
// ================================================================
function renderSector(h) {
  var sectorMap = {};
  h.forEach(function(hh){ sectorMap[hh.sector] = (sectorMap[hh.sector] || 0) + hh.currentVal; });
  var sectors = Object.entries(sectorMap).sort(function(a,b){ return b[1] - a[1]; });
  var totalV  = h.reduce(function(s,hh){ return s + hh.currentVal; }, 0);
  var colors  = ['#0AD1A6','#00D09E','#FB3640','#FF9F0A','#38bdf8','#818cf8','#f472b6','#a78bfa'];
  var legend  = document.getElementById('sectorLeg');
  legend.innerHTML = sectors.map(function(s,i){
    return '<span class="s-item"><span class="s-dot" style="background:' + colors[i % colors.length] + '"></span>'
      + s[0].replace('Consumer','C.') + ' ' + Math.round(s[1]/totalV*100) + '%</span>';
  }).join('');
  if (sectorChartInst) sectorChartInst.destroy();
  sectorChartInst = new Chart(document.getElementById('sectorChart'), {
    type: 'doughnut',
    data: {
      labels: sectors.map(function(s){ return s[0]; }),
      datasets: [{ data: sectors.map(function(s){ return s[1]; }), backgroundColor: colors, borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '68%',
      plugins: { legend: { display: false }, tooltip: { callbacks: {
        label: function(ctx){ return ctx.label + ': ' + Math.round(ctx.parsed/totalV*100) + '%'; }
      }}}
    }
  });
}

// ================================================================
// RENDER: Performance heatmap
// ================================================================
function renderPerf(data) {
  document.getElementById('perfBody').innerHTML = data.map(function(row){
    return '<tr><td class="yr-col">' + row.year + '</td>' +
      row.months.map(function(v){
        if (v === null) return '<td style="color:#4a5068">—</td>';
        var bg = v > 4 ? 'rgba(0,208,158,.25)' : v > 0 ? 'rgba(0,208,158,.1)' : v > -4 ? 'rgba(251,54,64,.1)' : 'rgba(251,54,64,.25)';
        var fg = v >= 0 ? '#00D09E' : '#FB3640';
        return '<td style="background:' + bg + ';color:' + fg + '">' + v.toFixed(1) + '%</td>';
      }).join('') +
      '<td style="font-weight:700;color:' + (row.yearTotal >= 0 ? '#00D09E' : '#FB3640') + '">' +
        (row.yearTotal !== null ? (row.yearTotal > 0 ? '+' : '') + row.yearTotal.toFixed(1) + '%' : '—') +
      '</td></tr>';
  }).join('');
}

// ================================================================
// RENDER: Holdings table
// ================================================================
function renderTable() {
  var q = document.getElementById('q').value.toLowerCase();
  var rows = holdings.filter(function(h){ return h.symbol.toLowerCase().includes(q); });
  rows.sort(function(a, b){
    var av = a[sortKey], bv = b[sortKey];
    if(typeof av === 'string') return sortDir * av.localeCompare(bv);
    return (bv - av) * sortDir;
  });
  document.getElementById('holdBody').innerHTML = rows.map(function(h){
    return '<tr>' +
      '<td style="font-weight:500">' + h.symbol + '</td>' +
      '<td><span class="cap ' + h.cap + '">' + h.cap + '</span></td>' +
      '<td>₹' + h.cost.toLocaleString('en-IN') + '</td>' +
      '<td>' + h.qty.toLocaleString('en-IN') + '</td>' +
      '<td>₹' + h.cmp.toLocaleString('en-IN') + '</td>' +
      '<td>₹' + fmtL(h.currentVal) + '</td>' +
      '<td style="color:' + (h.gainPct >= 0 ? '#00D09E' : '#FB3640') + '">' + fmtPct(h.gainPct) + '</td>' +
      '<td style="color:' + (h.todayPct >= 0 ? '#00D09E' : '#FB3640') + '">' + fmtPct(h.todayPct) + '</td>' +
      '<td>' + h.posSize.toFixed(2) + '%</td>' +
    '</tr>';
  }).join('');
}

var COL_KEYS = ['symbol','','cost','qty','cmp','currentVal','gainPct','todayPct','posSize'];
function sortBy(k) {
  if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = -1; }
  // update sort buttons
  document.querySelectorAll('.sort-btn').forEach(function(b){ b.classList.remove('on'); });
  var sbEl = document.getElementById('sb-' + k);
  if(sbEl) sbEl.classList.add('on');
  // update header arrows
  var ths = document.querySelectorAll('#holdThead th');
  ths.forEach(function(th,i){
    th.textContent = th.textContent.replace(' ↑','').replace(' ↓','');
    if(COL_KEYS[i] === k) th.textContent += sortDir === -1 ? ' ↓' : ' ↑';
  });
  renderTable();
}

// ================================================================
// RENDER: Top gainers / losers
// ================================================================
function renderTopGL() {
  var sorted = [...holdings].sort(function(a,b){ return b.gainPct - a.gainPct; });
  document.getElementById('topGain').innerHTML = sorted.slice(0, 5).map(function(h){
    return '<div class="rank-item"><span class="rank-sym">' + h.symbol + '</span>' +
      '<span class="pct-chip pct-g">' + fmtPct(h.gainPct) + '</span></div>';
  }).join('');
  document.getElementById('topLoss').innerHTML = sorted.slice(-5).reverse().map(function(h){
    return '<div class="rank-item"><span class="rank-sym">' + h.symbol + '</span>' +
      '<span class="pct-chip pct-r">' + fmtPct(h.gainPct) + '</span></div>';
  }).join('');
}

// ================================================================
// HELPERS
// ================================================================
function set(id, v){ document.getElementById(id).textContent = v; }

function toggleTheme(){
  var isLight = document.documentElement.classList.toggle('light');
  document.getElementById('themeBtn').textContent = isLight ? '☾ Dark' : '☀ Light';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  if(navChartInst) { navChartInst.destroy(); navChartInst=null; }
  if(sectorChartInst){ sectorChartInst.destroy(); sectorChartInst=null; }
  loadAll();
}
function fmtL(n){
  if(n==null||isNaN(n)) return '—';
  var a = Math.abs(n);
  var sign = n < 0 ? '-' : '';
  if (a >= 10000000) return sign + (a/10000000).toFixed(2) + 'Cr';
  if (a >= 100000)   return sign + (a/100000).toFixed(2) + 'L';
  if (a >= 1000)     return sign + (a/1000).toFixed(1) + 'K';
  return sign + a;
}
function fmtPct(v){ if(v==null||isNaN(v)) return '—'; return (v>=0?'+':'')+(+v).toFixed(2)+'%'; }

// ── Boot sequence ────────────────────────────────────────
// Step 1: Apply saved theme immediately
(function(){
  if(localStorage.getItem('theme')==='light'){
    document.documentElement.classList.add('light');
    var tb=document.getElementById('themeBtn');
    if(tb) tb.textContent='☾ Dark';
  }
})();

// Step 2: Render mock data right now (no Chart.js needed) so page never shows zeros
// Real API data will overwrite this once loaded
renderAll({ portfolio: MOCK.portfolio, nav: MOCK.nav, performance: MOCK.performance });

// Step 3: Load Chart.js, then fetch real API data
function startDashboard() {
  loadAll();                               // fetch live data (or stay on mock if MOCK_MODE)
  setInterval(loadAll, 5 * 60 * 1000);    // auto-refresh every 5 min
}
var cjsScript = document.createElement('script');
cjsScript.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
cjsScript.onload  = startDashboard;
cjsScript.onerror = function(){
  // Chart.js failed but data is already showing — only charts missing
  console.warn('Chart.js failed to load — charts unavailable');
  setStatus('err', 'Charts unavailable (CDN blocked?) — data showing below');
};
document.head.appendChild(cjsScript);


</script>
