<script>
// ================================================================
// CONFIG
// ================================================================
const API_URL = "https://script.google.com/macros/s/AKfycbyMZVltPoHDGEc6nf9pF_8jis_FK8WDmnAgH3ghETP1LA4WX_fksu3MqSal6m3LGy8m8Q/exec";
const REFRESH_INTERVAL = 60 * 1000; // 1 min

let holdings = [];
let lastData = null;

// ================================================================
// ⚡ INSTANT LOAD (from cache)
// ================================================================
(function init() {
  const cached = localStorage.getItem("dashboard_cache");
  if (cached) {
    try {
      const data = JSON.parse(cached);
      renderAll(data);
      setStatus("ok", "Cached data loaded");
    } catch(e){}
  }
})();

// ================================================================
// 🚀 MAIN FETCH (NO DELAY)
// ================================================================
async function fetchData() {
  try {
    const resp = await fetch(API_URL + "?action=all&t=" + Date.now());

    if (!resp.ok) throw new Error("HTTP " + resp.status);

    const json = await resp.json();

    if (!json.ok || !json.data) {
      throw new Error(json.error || "Invalid API");
    }

    const newData = json.data;

    // 💾 Cache store
    localStorage.setItem("dashboard_cache", JSON.stringify(newData));

    // ⚡ Smart update (no flicker)
    if (!lastData) {
      renderAll(newData);
    } else {
      updateLive(newData);
    }

    lastData = newData;

    setStatus("ok", "Live " + new Date().toLocaleTimeString("en-IN"));

  } catch (e) {
    console.error("API ERROR:", e);
    setStatus("err", e.message);
  }
}

// ================================================================
// 🔁 SMART LIVE UPDATE (NO FULL RELOAD)
// ================================================================
function updateLive(data) {
  if (!data) return;

  // NAV update
  if (data.portfolio?.summary?.currentNav) {
    const nav = data.portfolio.summary.currentNav.toFixed(2);
    document.getElementById("kpiNav").textContent = nav;
  }

  // Today's gain update
  if (data.portfolio?.summary?.todayGain !== undefined) {
    const tg = data.portfolio.summary.todayGain;
    const el = document.getElementById("kpiToday");
    el.textContent = (tg >= 0 ? "+" : "") + "₹" + fmtL(tg);
    el.className = "kpi-val " + (tg >= 0 ? "g" : "r");
  }

  // Drawdown
  if (data.portfolio?.summary?.currentDD) {
    document.getElementById("kpiDD2").textContent =
      data.portfolio.summary.currentDD.toFixed(2) + "%";
  }
}

// ================================================================
// 🧠 FULL RENDER (FIRST TIME)
// ================================================================
function renderAll(data) {
  if (!data) return;

  renderKPIs(data.portfolio.summary, data.indexData, data.benchmarking);
  renderPerf(data.performance || []);

  holdings = data.portfolio.holdings || [];
  renderTable();
  renderTopGL();

  if (typeof Chart !== "undefined") {
    renderBenchmarkChart(data.benchmarking);
    renderSector(holdings);
  }

  document.getElementById("overlay").classList.add("hide");
}

// ================================================================
// STATUS
// ================================================================
function setStatus(type, msg) {
  const el = document.getElementById("status");
  el.className = type;
  el.textContent = msg;
}

// ================================================================
// AUTO REFRESH ENGINE
// ================================================================
function startLive() {
  fetchData();
  setInterval(fetchData, REFRESH_INTERVAL);
}

// ================================================================
// LOAD CHART.JS + START
// ================================================================
const script = document.createElement("script");
script.src = "https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js";

script.onload = () => {
  startLive();
};

script.onerror = () => {
  setStatus("err", "Chart load failed");
};

document.head.appendChild(script);
</script>
